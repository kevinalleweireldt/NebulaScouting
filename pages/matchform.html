<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Match Form — Nebula Scouting</title>
    <link rel="stylesheet" href="../style/style.css" />
</head>
<body>
    <div class="main">
        <div class="navbar"></div>

        <div class="content">
            <h1>Match Form</h1>
            <p class="subtitle">2026 FRC REBUILT</p>

            <div class="section-card">
                <h2>Match Info</h2>
                <div class="match-inputs match-inputs--row">
                    <div class="input-field">
                        <label for="matchNumber">Match Number</label>
                        <input type="text" id="matchNumber" placeholder="e.g. 12" inputmode="numeric" />
                    </div>
                    <div class="input-field">
                        <label for="teamNumber">Team Number</label>
                        <input type="text" id="teamNumber" placeholder="e.g. 1234" inputmode="numeric" />
                    </div>
                </div>
            </div>

            <div class="section-card">
                <h2>Autonomous</h2>
                <div class="score-group">
                    <button class="btn" id="subtractAutoFuel" aria-label="Subtract auto fuel">−</button>
                    <div class="match-info">
                        <h3>Auto FUEL</h3>
                        <span id="auto-fuel-score">0</span>
                    </div>
                    <button class="btn" id="addAutoFuel" aria-label="Add auto fuel">+</button>
                </div>
                <div class="field-label">Auto Tower Climb</div>
                <div class="radio-group">
                    <label><input type="radio" name="autoClimb" value="0" checked> None</label>
                    <label><input type="radio" name="autoClimb" value="1"> Level 1 (15 pts)</label>
                    <label><input type="radio" name="autoClimb" value="2"> Level 2 (20 pts)</label>
                    <label><input type="radio" name="autoClimb" value="3"> Level 3 (30 pts)</label>
                </div>
            </div>

            <div class="section-card">
                <h2>Teleop</h2>
                <div class="score-group">
                    <button class="btn" id="subtractTeleopFuel" aria-label="Subtract teleop fuel">−</button>
                    <div class="match-info">
                        <h3>Teleop FUEL</h3>
                        <span id="teleop-fuel-score">0</span>
                    </div>
                    <button class="btn" id="addTeleopFuel" aria-label="Add teleop fuel">+</button>
                </div>
            </div>

            <div class="section-card">
                <h2>Endgame</h2>
                <div class="field-label">Tower Climb</div>
                <div class="radio-group">
                    <label><input type="radio" name="endgameClimb" value="0" checked> None</label>
                    <label><input type="radio" name="endgameClimb" value="1"> Level 1 (15 pts)</label>
                    <label><input type="radio" name="endgameClimb" value="2"> Level 2 (20 pts)</label>
                    <label><input type="radio" name="endgameClimb" value="3"> Level 3 (30 pts)</label>
                </div>
            </div>

            <div class="section-card">
                <h2>Notes</h2>
                <div class="checkbox-row">
                    <label><input type="checkbox" id="defense"> Played Defense</label>
                    <label><input type="checkbox" id="brokeDown"> Broke Down</label>
                </div>
                <div class="match-inputs">
                    <div class="input-field">
                        <label for="extraComments">Extra Comments</label>
                        <textarea id="extraComments" placeholder="Anything else worth noting…" rows="3"></textarea>
                    </div>
                </div>
            </div>

            <div class="buttons-container">
                <button id="submitScores" class="btn">Submit Match</button>
            </div>
        </div>
    </div>

    <script type="module" src="../script/app.js"></script>
    <script src="../script/navbar.js"></script>
</body>
</html>
