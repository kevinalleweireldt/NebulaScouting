<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In — Nebula Scouting</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="stylesheet" href="../style/style.css" />
</head>
<body>
    <div class="main">
        <a href="/" class="login-home-link brand-lockup" aria-label="Back to home">
    <img src="/images/logo.svg" alt="" class="brand-mark">
    <span class="wordmark">Nebula Scouting</span>
</a>
        <div class="content content--hero">
            <p class="subtitle">2026 FRC REBUILT</p>
            <h1>Nebula Scouting</h1>

            <form id="loginForm" class="section-card login-card" novalidate>
                <h2>Sign In</h2>
                <div class="match-inputs">
                    <div class="input-field">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" name="email" placeholder="you@example.com" autocomplete="email" required />
                    </div>
                    <div class="input-field">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" name="password" placeholder="Password" autocomplete="current-password" required />
                    </div>
                </div>
                <p id="loginError" class="form-error" hidden></p>
                <div class="buttons-container">
                    <button type="submit" id="loginBtn" class="btn btn-lg">Sign In</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../script/login.js"></script>
</body>
</html>
