<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin — Nebula Scouting</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="stylesheet" href="../style/style.css" />
</head>
<body class="auth-loading">
    <div class="main">
        <div class="navbar"></div>

        <div class="content">
            <div class="page-head">
                <h1>Admin Panel</h1>
                <p class="subtitle">Accounts &amp; permissions</p>
            </div>

            <div class="section-card section-card--tight">
                <h2>Create Scouter Account</h2>
                <div class="match-inputs match-inputs--row">
                    <div class="input-field">
                        <label for="newEmail">Email</label>
                        <input type="email" id="newEmail" placeholder="scouter@example.com" />
                    </div>
                    <div class="input-field">
                        <label for="newDisplayName">Display Name</label>
                        <input type="text" id="newDisplayName" placeholder="First Last" />
                    </div>
                    <div class="input-field">
                        <label for="newPassword">Temporary Password</label>
                        <input type="password" id="newPassword" placeholder="Min 6 characters" />
                    </div>
                </div>
                <p id="createUserStatus" class="form-error" hidden></p>
                <div class="buttons-container">
                    <button class="btn" id="createUserBtn">Create Account</button>
                </div>
            </div>

            <div class="section-card section-card--tight">
                <h2>Event Configuration</h2>
                <p class="subtitle">TBA event key for the active competition (e.g. <code>2026miket</code>). Drives match-form dropdowns, team nicknames, and the Next Match KPI.</p>
                <div class="match-inputs match-inputs--row">
                    <div class="input-field">
                        <label for="eventKey">TBA Event Key</label>
                        <input type="text" id="eventKey" placeholder="2026miket" autocomplete="off" />
                    </div>
                </div>
                <p id="eventKeyStatus" class="form-error" hidden></p>
                <div class="buttons-container">
                    <button class="btn" id="saveEventKeyBtn">Save Event Key</button>
                </div>
            </div>

            <div class="section-card section-card--tight">
                <h2>Accounts</h2>
                <div id="userListContainer"><p class="empty-state">Loading…</p></div>
            </div>
        </div>
    </div>

    <script type="module" src="../script/admin.js"></script>
    <script type="module" src="../script/navbar.js"></script>
</body>
</html>
