<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Comparison</title>
    <link rel="stylesheet" href="../style/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body class="auth-loading">
    <div class="navbar"></div>
    <div class="main">
        <div class="content">
            <div class="page-head">
                <h1>Team Comparison</h1>
                <p class="subtitle">Up to 5 teams · trend overlay</p>
            </div>

            <div class="chip-rail-wrap">
                <p class="chip-rail-label">Select teams to overlay</p>
                <div class="chip-rail" id="teamChipRail"></div>
                <div class="chip-rail-controls">
                    <input type="text" id="teamFilter" placeholder="Filter teams..." />
                    <button class="btn btn-ghost btn-sm" id="clearTeamsBtn" type="button">Clear</button>
                </div>
            </div>

            <div class="trend-chart-card">
                <h3>Score Trend</h3>
                <p class="trend-sub">Per-match score &amp; running average — toggle series in the legend</p>
                <div class="trend-chart-canvas-wrap">
                    <canvas id="chartTrend"></canvas>
                </div>
                <div class="trend-toggles">
                    <label class="trend-toggle"><input type="checkbox" id="toggleRaw" checked> Per-match scores</label>
                    <label class="trend-toggle"><input type="checkbox" id="toggleAvg" checked> Running average</label>
                    <label class="trend-toggle"><input type="checkbox" id="toggleFuel"> Total FUEL (auto + teleop)</label>
                </div>
            </div>

            <div id="comparisonResult" hidden>
                <h2>Stat Comparison</h2>
                <div style="overflow-x:auto;">
                    <table class="match-table" id="comparisonTable"></table>
                </div>

                <h2>Per-Team Match Detail</h2>
                <div id="comparisonDetails"></div>
            </div>

            <div id="comparisonEmpty" class="empty-state">
                Pick at least one team above to see its trend. Add more teams to overlay them.
            </div>
        </div>
    </div>

    <script type="module" src="../script/teamcomparison.js"></script>
    <script type="module" src="../script/navbar.js"></script>
</body>
</html>
