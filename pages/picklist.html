<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick List</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="stylesheet" href="../style/style.css">
</head>
<body class="auth-loading">
    <div class="navbar"></div>
    <div class="main">
        <div class="content">
            <div class="page-head">
                <h1>Pick List</h1>
                <p class="subtitle">Drag rows or use ▲ ▼ to reorder</p>
            </div>

            <div class="kpi-strip">
                <div class="kpi">
                    <p class="kpi-label">Teams On List</p>
                    <h2 class="kpi-value" id="pkCount">—</h2>
                    <div class="kpi-sub"><span class="kpi-hint" id="pkCountHint">ranked</span></div>
                </div>
                <div class="kpi">
                    <p class="kpi-label">Avg of Top 3</p>
                    <h2 class="kpi-value" id="pkTop3">—</h2>
                    <div class="kpi-sub"><span class="kpi-hint">avg score</span></div>
                </div>
                <div class="kpi">
                    <p class="kpi-label">Best Avg Score</p>
                    <h2 class="kpi-value kpi-value--sm" id="pkBest">—</h2>
                    <div class="kpi-sub"><span class="kpi-hint" id="pkBestHint">—</span></div>
                </div>
                <div class="kpi">
                    <p class="kpi-label">Without Data</p>
                    <h2 class="kpi-value kpi-value--sm" id="pkUnscouted">—</h2>
                    <div class="kpi-sub"><span class="kpi-hint">no matches yet</span></div>
                </div>
            </div>

            <div class="data-controls">
                <input type="text" id="addTeamInput" placeholder="Team number..." />
                <button class="btn" id="addTeamBtn">Add Team</button>
                <button class="btn" id="autoPopulateBtn">Auto-Populate by Avg Score</button>
                <button class="btn" id="seedFromEventBtn">Seed from Event</button>
                <button class="btn btn-danger" id="clearPicklist">Clear List</button>
            </div>

            <div id="pickListContainer"></div>
        </div>
    </div>

    <script type="module" src="../script/picklist.js"></script>
    <script type="module" src="../script/navbar.js"></script>
</body>
</html>
