<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Data</title>
    <link rel="stylesheet" href="../style/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body class="auth-loading">
    <div class="navbar"></div>
    <div class="main">
        <div class="content">
            <h1>Match Data</h1>

            <div class="data-controls">
                <input type="text" id="filterTeam" placeholder="Filter by team #..." />
                <select id="sortField" aria-label="Sort field">
                    <option value="matchNumber">Sort: Match #</option>
                    <option value="teamNumber">Sort: Team #</option>
                    <option value="score">Sort: Score</option>
                    <option value="autoFuel">Sort: Auto FUEL</option>
                    <option value="teleopFuel">Sort: Teleop FUEL</option>
                    <option value="endgameClimb">Sort: Endgame Climb</option>
                    <option value="timestamp">Sort: Time</option>
                </select>
                <select id="sortDir" aria-label="Sort direction">
                    <option value="asc">Ascending</option>
                    <option value="desc">Descending</option>
                </select>
                <button class="btn" id="exportCsv">Export CSV</button>
                <button class="btn btn-danger" id="clearData">Clear All Data</button>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" data-tab="allMatches">All Matches</button>
                <button class="tab-btn" data-tab="teamAverages">Team Averages</button>
                <button class="tab-btn" data-tab="charts">Charts</button>
            </div>

            <div id="tab-allMatches" class="tab-panel">
                <div id="matchTableContainer"></div>
            </div>

            <div id="tab-teamAverages" class="tab-panel" hidden>
                <div id="avgTableContainer"></div>
            </div>

            <div id="tab-charts" class="tab-panel" hidden>
                <div class="chart-grid">
                    <div class="chart-card">
                        <h3>Avg Total Score by Team</h3>
                        <canvas id="chartAvgScore"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>Avg Auto FUEL by Team</h3>
                        <canvas id="chartAutoFuel"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>Avg Teleop FUEL by Team</h3>
                        <canvas id="chartTeleopFuel"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>Endgame Climb Distribution</h3>
                        <canvas id="chartClimb"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../script/matchdata.js"></script>
    <script type="module" src="../script/navbar.js"></script>
</body>
</html>
