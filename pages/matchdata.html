<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Data</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="stylesheet" href="../style/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body class="auth-loading">
    <div class="navbar"></div>
    <div class="main">
        <div class="content">
            <div class="page-head">
                <h1>Match Data</h1>
                <p class="subtitle" id="matchDataSubtitle">Live · 2026 Season</p>
            </div>

            <div class="kpi-strip" id="matchDataKpis">
                <div class="kpi">
                    <p class="kpi-label">Total Matches</p>
                    <h2 class="kpi-value" id="kpiTotalMatches">—</h2>
                    <div class="kpi-sub"><span class="kpi-hint" id="kpiTotalHint">across all teams</span></div>
                    <canvas class="kpi-spark" id="kpiSparkMatches"></canvas>
                </div>
                <div class="kpi">
                    <p class="kpi-label">Teams Scouted</p>
                    <h2 class="kpi-value" id="kpiTeams">—</h2>
                    <div class="kpi-sub"><span class="kpi-hint" id="kpiTeamsHint">unique</span></div>
                </div>
                <div class="kpi">
                    <p class="kpi-label">Avg Score</p>
                    <h2 class="kpi-value" id="kpiAvgScore">—</h2>
                    <div class="kpi-sub"><span class="kpi-hint" id="kpiAvgHint">per match</span></div>
                </div>
                <div class="kpi">
                    <p class="kpi-label">Top Team</p>
                    <h2 class="kpi-value kpi-value--sm" id="kpiTopTeam">—</h2>
                    <div class="kpi-sub"><span class="kpi-hint" id="kpiTopHint">by avg score</span></div>
                </div>
                <div class="kpi">
                    <p class="kpi-label">Latest Match</p>
                    <h2 class="kpi-value kpi-value--sm" id="kpiLatest">—</h2>
                    <div class="kpi-sub"><span class="kpi-hint" id="kpiLatestHint">submitted</span></div>
                </div>
            </div>

            <div class="data-controls">
                <input type="text" id="filterTeam" placeholder="Filter by team #..." />
                <select id="sortField" aria-label="Sort field">
                    <option value="matchNumber">Sort: Match #</option>
                    <option value="teamNumber">Sort: Team #</option>
                    <option value="score">Sort: Score</option>
                    <option value="autoFuel">Sort: Auto FUEL</option>
                    <option value="teleopFuel">Sort: Teleop FUEL</option>
                    <option value="endgameClimb">Sort: Endgame Climb</option>
                    <option value="timestamp">Sort: Time</option>
                </select>
                <select id="sortDir" aria-label="Sort direction">
                    <option value="asc">Ascending</option>
                    <option value="desc">Descending</option>
                </select>
                <button class="btn" id="exportCsv">Export CSV</button>
                <button class="btn btn-danger" id="clearData">Clear All Data</button>
            </div>

            <div class="tab-bar">
                <button class="tab-btn active" data-tab="allMatches">All Matches</button>
                <button class="tab-btn" data-tab="teamAverages">Team Averages</button>
                <button class="tab-btn" data-tab="charts">Charts</button>
            </div>

            <div id="tab-allMatches" class="tab-panel">
                <div id="matchTableContainer"></div>
            </div>

            <div id="tab-teamAverages" class="tab-panel" hidden>
                <div id="avgTableContainer"></div>
            </div>

            <div id="tab-charts" class="tab-panel" hidden>
                <div class="chart-grid">
                    <div class="chart-card">
                        <h3>Avg Total Score by Team</h3>
                        <canvas id="chartAvgScore"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>Avg Auto FUEL by Team</h3>
                        <canvas id="chartAutoFuel"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>Avg Teleop FUEL by Team</h3>
                        <canvas id="chartTeleopFuel"></canvas>
                    </div>
                    <div class="chart-card">
                        <h3>Endgame Climb Distribution</h3>
                        <canvas id="chartClimb"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="../script/matchdata.js"></script>
    <script type="module" src="../script/navbar.js"></script>
</body>
</html>
